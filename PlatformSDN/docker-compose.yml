version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sdn-postgres
    environment:
      POSTGRES_USER: sdnuser
      POSTGRES_PASSWORD: sdnpass123
      POSTGRES_DB: sdn_platform
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sdnuser']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdn-network

  # Optional: pgAdmin pour visualiser la DB
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sdn-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sdn.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres
    networks:
      - sdn-network

volumes:
  postgres_data:

networks:
  sdn-network:
    driver: bridge
