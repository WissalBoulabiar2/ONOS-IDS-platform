apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdn-platform-backend
  labels:
    app: sdn-platform
    tier: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sdn-platform
      tier: backend
  template:
    metadata:
      labels:
        app: sdn-platform
        tier: backend
    spec:
      serviceAccountName: sdn-platform
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: backend
        image: ghcr.io/yasmine-fst/sdn-platform:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: NODE_ENV
          value: production
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: sdn-config
              key: db_host
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: sdn-config
              key: db_port
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: sdn-config
              key: db_name
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: sdn-secrets
              key: db_user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sdn-secrets
              key: db_password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: sdn-secrets
              key: jwt_secret
        - name: ONOS_HOST
          valueFrom:
            configMapKeyRef:
              name: sdn-config
              key: onos_host
        - name: ONOS_PORT
          valueFrom:
            configMapKeyRef:
              name: sdn-config
              key: onos_port
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sdn-platform-backend
spec:
  type: ClusterIP
  selector:
    app: sdn-platform
    tier: backend
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sdn-platform-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sdn-platform-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sdn-config
data:
  db_host: postgres.default
  db_port: "5432"
  db_name: sdn_platform
  onos_host: onos.default
  onos_port: "8181"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sdn-platform
