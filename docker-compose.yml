version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sdn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sdn_platform}
      POSTGRES_USER: ${DB_USER:-sdnuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sdnpass123}
      POSTGRES_INITDB_ARGS: >-
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c work_mem=16MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./PlatformSDN/backend/migrations:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-sdnuser}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdn_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: sdn-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdn_network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sdn-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-5000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-sdn_platform}
      DB_USER: ${DB_USER:-sdnuser}
      DB_PASSWORD: ${DB_PASSWORD:-sdnpass123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ONOS_HOST: ${ONOS_HOST:-localhost}
      ONOS_PORT: ${ONOS_PORT:-8181}
      ONOS_USER: ${ONOS_USER:-karaf}
      ONOS_PASSWORD: ${ONOS_PASSWORD:-karaf}
      JWT_SECRET: ${JWT_SECRET:-change-me-platformsdn-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      BCRYPT_SALT_ROUNDS: 10
      ENABLE_AUTO_SYNC: 'true'
      SYNC_INTERVAL_MS: 5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${PORT:-5000}:5000"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sdn_network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # Frontend UI
  frontend:
    build:
      context: ./PlatformSDN
      dockerfile: app/Dockerfile
    container_name: sdn-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:5000}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sdn_network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: sdn-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - sdn_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  sdn_network:
    driver: bridge
